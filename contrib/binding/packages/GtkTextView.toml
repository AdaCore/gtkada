# ============================================================
#   GtkTextView
# ============================================================

[[parameter]]
name = "self"
ada = "View"

[[enum]]
ctype = "GtkTextViewLayer"

[[enum]]
ctype = "GtkTextExtendSelection"
# These are now inherited from the Scrollable interface

[[method]]
id = "gtk_text_view_get_hadjustment"
bind = false

[[method]]
id = "gtk_text_view_get_vadjustment"
bind = false

[[method]]
id = "gtk_text_view_set_hadjustment"
bind = false

[[method]]
id = "gtk_text_view_set_vadjustment"
bind = false

[[method]]
id = "gtk_text_view_new_with_buffer"
ada = "Gtk_New"

[[virtual_method]]
id = "draw_layer"
bind = true

[virtual_method.doc]
text = '''
The draw_layer virtual function is called before and after the text
view is drawing its own text. Applications can override this vfunc
in a subclass to draw customized content underneath or above the
text. Since: 3.14'''