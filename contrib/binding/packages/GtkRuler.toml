
# ============================================================
#   GtkRuler
# ============================================================
[GtkRuler]

  [GtkRuler.doc]
    screenshot = "gtk-rulers"
    group = "Drawing"
    testgtk = "create_rulers.adb"
    text = " This widget is generally put on the sides of a drawing area to help the user measure distances. It indicates the current position of the mouse cursor within the drawing area, and can be graduated in multiple units."

  [[GtkRuler.parameter]]
    name = "self"
    ada = "Ruler"

  [[GtkRuler.method]]
    id = "gtk_ruler_set_metric"

    [GtkRuler.method.doc]
      text = "Set or get the units used for a Gtk_Ruler. See Set_Metric"