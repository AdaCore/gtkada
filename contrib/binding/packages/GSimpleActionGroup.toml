
# ============================================================
#   GSimpleActionGroup
# ============================================================
[GSimpleActionGroup]
  ada = "Glib.Simple_Action_Group"

  [[GSimpleActionGroup.method]]
    id = "g_simple_action_group_add_entries"

    [[GSimpleActionGroup.method.parameter]]
      name = "entries"
      type = "Glib.Action_Map.GAction_Entry_Array"

    [[GSimpleActionGroup.method.parameter]]
      name = "n_entries"
      ada = ""
      default = "Entries'Length"

    [[GSimpleActionGroup.method.parameter]]
      name = "user_data"
      default = "System.Null_Address"