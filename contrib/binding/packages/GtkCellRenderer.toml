# ============================================================
#   GtkCellRenderer
# ============================================================
# GtkCellRenderer has been deprecated since gtk 4.10; mark the
# whole Ada package as obsolescent.

obsolescent = true

[doc]
group = "Trees and Lists"

[[parameter]]
name = "self"
ada  = "Cell"

[[enum]]
ctype = "GtkCellRendererState"

[[enum]]
ctype = "GtkCellRendererMode"

[[list]]
ada   = "Cell_Renderer_List"
ctype = "GtkCellRenderer"

# The methods below take GdkEvent or GtkSnapshot parameters.
# GtkAda does not yet bind these types for gtk4, so suppress them
# for now; revisit once those types are available.

[[method]]
id   = "gtk_cell_renderer_activate"
bind = false
# Needs GdkEvent.

[[method]]
id   = "gtk_cell_renderer_snapshot"
bind = false
# Needs GtkSnapshot.

[[method]]
id   = "gtk_cell_renderer_start_editing"
bind = false
# Needs GdkEvent.
