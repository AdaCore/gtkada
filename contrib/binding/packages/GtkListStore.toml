# ============================================================
#   GtkListStore
# ============================================================

# It has been deprecated since gtk 4.10

obsolescent = true

parent = "Gtk.Tree_Model.Gtk_Root_Tree_Model"

[[method]]
id = "gtk_list_store_newv"
ada = "Gtk_New"

[[method.parameter]]
name = "types"
type = "GType_Array"

[[method.parameter]]
name = "n_columns"
ada = ""
default = "Types'Length"

[[method]]
id = "gtk_list_store_set_column_types"

[[method.parameter]]
name = "types"
type = "GType_Array"

[[method.parameter]]
name = "n_columns"
ada = ""
default = "Types'Length"

[[method]]
id = "gtk_list_store_insert_with_valuesv"
bind = false
# valist

[[method]]
id = "gtk_list_store_set_value"

[[method.parameter]]
name = "value"
ctype = "GValue"

[[method]]
id = "gtk_list_store_set_valist"
bind = false
# valist

[[method]]
id = "gtk_list_store_set_valuesv"
bind = false
# manually

[[method]]
id = "gtk_list_store_remove"
return = "void"
body = '''
      procedure Internal
         (Self : System.Address;
          Iter : in out Gtk.Tree_Model.Gtk_Tree_Iter);
      pragma Import (C, Internal, "gtk_list_store_remove");
      Tmp_Iter : aliased Gtk.Tree_Model.Gtk_Tree_Iter := Iter;
   begin
      Internal (Get_Object (Self), Tmp_Iter);
      Iter := Gtk.Tree_Model.Null_Iter;'''

[[method.parameter]]
name = "iter"
direction = "inout"

[extra]
body = '''

   procedure Set
     (Self   : access Gtk_List_Store_Record;
      Iter   : Gtk.Tree_Model.Gtk_Tree_Iter;
      Column : Gint;
      Value  : UTF8_String)
   is
      procedure Internal
        (Self   : System.Address;
         Iter   : Gtk.Tree_Model.Gtk_Tree_Iter;
         Column : Gint;
         Value  : UTF8_String);
      pragma Import (C, Internal, "ada_gtk_list_store_set_ptr");
   begin
      Internal (Get_Object (Self), Iter, Column, Value & ASCII.NUL);
   end Set;

   procedure Set
     (Self   : access Gtk_List_Store_Record;
      Iter   : Gtk.Tree_Model.Gtk_Tree_Iter;
      Column : Gint;
      Value  : Gint)
   is
      procedure Internal
        (Self   : System.Address;
         Iter   : Gtk.Tree_Model.Gtk_Tree_Iter;
         Column : Gint;
         Value  : Gint);
      pragma Import (C, Internal, "ada_gtk_list_store_set_int");
   begin
      Internal (Get_Object (Self), Iter, Column, Value);
   end Set;

   procedure Set
     (Self   : access Gtk_List_Store_Record;
      Iter   : Gtk.Tree_Model.Gtk_Tree_Iter;
      Column : Gint;
      Value  : Boolean)
   is
      procedure Internal
        (Self   : System.Address;
         Iter   : Gtk.Tree_Model.Gtk_Tree_Iter;
         Column : Gint;
         Value  : Gboolean);
      pragma Import (C, Internal, "ada_gtk_list_store_set_int");
   begin
      Internal (Get_Object (Self), Iter, Column, Boolean'Pos (Value));
   end Set;

--   procedure Set
--     (Self   : access Gtk_List_Store_Record;
--      Iter   : Gtk.Tree_Model.Gtk_Tree_Iter;
--      Column : Gint;
--      Value  : Gdk.Pixbuf.Gdk_Pixbuf)
--   is
--      procedure Internal
--        (Self   : System.Address;
--         Iter   : Gtk.Tree_Model.Gtk_Tree_Iter;
--         Column : Gint;
--         Value  : System.Address);
--      pragma Import (C, Internal, "ada_gtk_list_store_set_ptr");
--   begin
--      Internal (Get_Object (Self), Iter, Column, Get_Object (Value));
--   end Set;

   procedure Set
     (Self    : not null access Gtk_List_Store_Record;
      Iter    : Gtk.Tree_Model.Gtk_Tree_Iter;
      Columns : Glib.Gint_Array;
      Values  : Glib.Values.GValue_Array)
   is
      procedure Internal
         (Self     : System.Address;
          Iter     : Gtk.Tree_Model.Gtk_Tree_Iter;
          Columns  : System.Address;
          Values   : System.Address;
          N_Values : Gint);
      pragma Import (C, Internal, "gtk_list_store_set_valuesv");
   begin
      if Columns'Length = Values'Length then
         Internal (Get_Object (Self), Iter,
                   Columns (Columns'First)'Address,
                   Values (Values'First)'Address, Values'Length);
      end if;
   end Set;

   procedure Set
     (Self   : not null access Gtk_List_Store_Record;
      Iter   : Gtk.Tree_Model.Gtk_Tree_Iter;
      Values : Glib.Values.GValue_Array)
   is
      Columns : Gint_Array (Integer (Values'First) .. Integer (Values'Last));
   begin
      for C in Columns'Range loop
         Columns (C) := Gint (C);
      end loop;
      Set (Self, Iter, Columns, Values);
   end Set;
       '''

