# ============================================================
#   GApplicationCommandLine
# ============================================================
into = "GApplication"
ada = "Glib.Application"

[[method]]
id = "g_application_command_line_create_file_for_arg"
bind = false
# requires GFile

[[method]]
id = "g_application_command_line_get_stdin"
bind = false
# requires GInputStream

[[method]]
id = "g_application_command_line_get_type"
ada = "Get_Type_Command_Line"

[[method]]
id = "g_application_command_line_get_options_dict"
bind = false
# requires GVariant

[[method]]
id = "g_application_command_line_get_arguments"

[method.return_value]
transfer_ownership = "full"

[[method.parameter]]
name = "argc"
ada = ""
default = "null"

[extra]
body = '''

   gnat_argc : Interfaces.C.int;
   pragma Import (C, gnat_argc);

   gnat_argv : System.Address;
   pragma Import (C, gnat_argv);

   function Run
      (Self : not null access Gapplication_Record) return Gint
   is
      function Internal
         (Self : System.Address;
          Argc : Gint;
          Argv : System.Address) return Gint;
      pragma Import (C, Internal, "g_application_run");
   begin
      return Internal (Self.Get_Object, Gint (gnat_argc), gnat_argv);
   end Run;
       '''

[[extra.spec]]
text = '''

   function Run
      (Self : not null access Gapplication_Record) return Gint;
   --  Same as above, but automatically sets argc argv from actual values.
       '''