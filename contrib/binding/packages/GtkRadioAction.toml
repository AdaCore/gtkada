# ============================================================
#   GtkRadioAction
# ============================================================

[doc]
group = "Action-based menus"
see = "Gtk_Action"

[[parameter]]
name = "self"
ada = "Action"

[[method]]
id = "gtk_radio_action_new"

[[method.parameter]]
name = "label"
default = "\"\""

[[method.parameter]]
name = "tooltip"
default = "\"\""

[[method.parameter]]
name = "stock_id"
default = "\"\""

[[method]]
id = "gtk_radio_action_set_group"

[method.doc]
extend = true
text = '''
A common way to set up a group of radio group is the following:

|[
      Group  : GSlist := null;
      Action : Gtk_Radio_Action;
      while ... loop
         Gtk_New (Action, ...);
         Set_Group (Action, Group);
         Group := Get_Group (Action);
      end loop;
]|'''

[[method.parameter]]
name = "group"
ctype = "WidgetSList"

[[method]]
id = "gtk_radio_action_get_group"
return = "WidgetSList"