[[method]]
id = "gtk_tree_view_insert_column"

[[method.parameter]]
name = "position"
default = "-1"

[[method]]
id = "gtk_tree_view_get_path_at_pos"
return_as_param = "Row_Found"

[[method]]
id = "gtk_tree_view_get_visible_range"
return_as_param = "Success"

[[method]]
id = "gtk_tree_view_get_tooltip_context"
return_as_param = "Success"

[[method]]
id = "gtk_tree_view_set_expander_column"

[[method.parameter]]
name = "column"
allow_none = "1"

[[method]]
id = "gtk_tree_view_get_hadjustment"
bind = false
