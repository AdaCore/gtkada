[[method]]
id = "gtk_tree_view_get_vadjustment"
bind = false
# from scrollable

[[method]]
id = "gtk_tree_view_set_hadjustment"
bind = false
# from scrollable

[[method]]
id = "gtk_tree_view_set_vadjustment"
bind = false
# from scrollable

[[method]]
id = "gtk_tree_view_enable_model_drag_source"

[[method.parameter]]
name = "targets"
ctype = "Gtk.Target_List.Target_Entry_Array"

[[method.parameter]]
name = "n_targets"
ada = ""
default = "Targets'Length"

[[method]]
id = "gtk_tree_view_enable_model_drag_dest"

[[method.parameter]]
name = "targets"
ctype = "Gtk.Target_List.Target_Entry_Array"

[[method.parameter]]
name = "n_targets"
ada = ""
default = "Targets'Length"

[extra]
body = '''

   procedure Gtk_New
      (Tree_View : out Gtk_Tree_View;
       Model     : access Gtk.Tree_Model.Gtk_Root_Tree_Model_Record'Class)
   is
   begin
      Gtk_New (Tree_View, To_Interface (Model));
   end Gtk_New;
       '''

[[extra.spec]]
text = '''

   procedure Gtk_New
      (Tree_View : out Gtk_Tree_View;
       Model     : access Gtk.Tree_Model.Gtk_Root_Tree_Model_Record'Class);
   --  A convenience function so that one can directly pass a model, without
   --  converting to a Gtk_Tree_Model via the "+" operator.
       '''