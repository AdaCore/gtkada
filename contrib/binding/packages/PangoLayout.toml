# ============================================================
#   PangoLayout
# ============================================================

[[parameter]]
name = "self"
ada = "Layout"

[[enum]]
ctype = "PangoEllipsizeMode"
prefix = "PANGO_"

[[method]]
id = "pango_layout_xy_to_index"
return_as_param = "Exact"

[[method.parameter]]
name = "index"
ada = "Byte_Index"
direction = "out"

[[method.parameter]]
name = "trailing"
direction = "out"

[[method]]
id = "pango_layout_get_direction"
bind = false
# more recent than 1.44
# Do not bind these, since they require a list of Pango_Layout_Line, which is incorrectly bound (error in From_Object)

[[method]]
id = "pango_layout_get_lines"
bind = false
return = "PangoLayoutLineSList"

[[method]]
id = "pango_layout_get_lines_readonly"
bind = false
return = "PangoLayoutLineSList"

[[method]]
id = "pango_layout_get_log_attrs"
bind = false
# what is a pango_log

[[method]]
id = "pango_layout_get_log_attrs_readonly"
bind = false
# what is a pango_log

[[method]]
id = "pango_layout_get_line_spacing"
bind = false

[[method]]
id = "pango_layout_set_line_spacing"
bind = false

[[method]]
id = "pango_layout_get_iter"
classwide = true

[[method]]
id = "pango_layout_set_attributes"

[[method.parameter]]
name = "attrs"
ctype = "PangoAttrList"
direction = "in"

[[method]]
id = "pango_layout_set_text"

[[method.parameter]]
name = "length"
ada = ""
default = "-1"

[[method]]
id = "pango_layout_set_markup"

[[method.parameter]]
name = "length"
ada = ""
default = "-1"

[extra]
body = '''

   function Get_Text (Layout : access Pango_Layout_Record)
      return Gtkada.Types.Chars_Ptr
   is
      function Internal (Layout : System.Address)
         return Gtkada.Types.Chars_Ptr;
      pragma Import (C, Internal, "pango_layout_get_text");
   begin
      return Internal (Get_Object (Layout));
   end Get_Text;
       '''

[[extra.with_spec]]
pkg = "Gtkada.Types"

[[extra.spec]]
text = '''

   function Get_Text (Layout : access Pango_Layout_Record)
      return Gtkada.Types.Chars_Ptr;
   --  Same a Get_Text, but return directly the C string, which is more
   --  efficient. The returned value should not be freed or modified.
       '''