# ============================================================
#   GdkDisplay
# ============================================================

ada_access_root = true

[[method]]
id = "gdk_display_get_app_launch_context"
bind = false
# No GdkAppLaunchContext binding

[[method]]
id = "gdk_display_list_seats"
return = "SeatList"

[[method]]
id = "gdk_display_map_keycode"
bind = false
# No array of GdkKeymapKey

[[method]]
id = "gdk_display_map_keyval"
bind = false
# No array of GdkKeymapKey

[[method]]
id = "gdk_display_translate_key"
bind = false
# No GdkModifierType binding

[[method]]
id = "::seat-added"

[[method.parameter]]
name = "seat"
ctype = "GdkSeat*"

[[method]]
id = "::seat-removed"

[[method.parameter]]
name = "seat"
ctype = "GdkSeat*"

[[method]]
id = "gdk_display_put_event"
bind = false
# No GdkEvent binding

[[extra.with_body]]
pkg = "System"
use = false