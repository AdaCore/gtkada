
# ============================================================
#   GdkDisplay
# ============================================================
[GdkDisplay]

  [[GdkDisplay.method]]
    id = "gdk_display_get_app_launch_context"
    bind = false
    # requires GdkAppLaunchContext

  [[GdkDisplay.method]]
    id = "gdk_display_list_devices"
    bind = false
    # deprecated

  [[GdkDisplay.method]]
    id = "gdk_display_get_default_screen"
    bind = false
    # in gdk-screen.ads

  [[GdkDisplay.method]]
    id = "gdk_display_get_screen"
    bind = false
    # in gdk-screen.ads

  [[GdkDisplay.method]]
    id = "gdk_display_get_pointer"
    bind = false
    # deprecated by Gdk.Device.Get_Position

  [[GdkDisplay.method]]
    id = "gdk_display_warp_pointer"
    bind = false
    # deprecated, Gdk.Device.Warp

  [[GdkDisplay.method]]
    id = "gdk_display_get_device_manager"
    bind = false
    # in gdk-device_manager.ads

  [[GdkDisplay.method]]
    id = "gdk_display_device_is_grabbed"
    bind = false
    # circular dependency

  [[GdkDisplay.method]]
    id = "gdk_display_store_clipboard"
    bind = false
    # see below

  [[GdkDisplay.method]]
    id = "gdk_display_get_window_at_pointer"
    bind = false
    # see below

  [[GdkDisplay.method]]
    id = "gdk_display_get_default_seat"
    return = "GObject*"

  [[GdkDisplay.method]]
    id = "gdk_display_list_seats"
    return = "ObjectList"

  [[GdkDisplay.method]]
    id = "::monitor-added"

    [[GdkDisplay.method.parameter]]
      name = "monitor"
      ctype = "GObject*"

  [[GdkDisplay.method]]
    id = "::monitor-removed"

    [[GdkDisplay.method.parameter]]
      name = "monitor"
      ctype = "GObject*"

  [[GdkDisplay.method]]
    id = "::seat-added"

    [[GdkDisplay.method.parameter]]
      name = "seat"
      ctype = "GObject*"

  [[GdkDisplay.method]]
    id = "::seat-removed"

    [[GdkDisplay.method.parameter]]
      name = "seat"
      ctype = "GObject*"

  [GdkDisplay.extra]
    body = '''

   procedure Store_Clipboard
     (Display          : not null access Gdk_Display_Record;
      Clipboard_Window : Gdk_Window;
      Time             : Guint32;
      Targets          : Gdk.Types.Gdk_Atom_Array)
   is
      procedure Internal
        (Display          : System.Address;
         Clipboard_Window : Gdk_Window;
         Time             : Guint32;
         Targets          : System.Address;
         N_Targets        : Gint);
      pragma Import (C, Internal, "gdk_display_store_clipboard");
   begin
      Internal (Get_Object (Display), Clipboard_Window, Time,
                Targets (Targets'First)'Address, Targets'Length);
   end Store_Clipboard;

   procedure Get_Window_At_Pointer
     (Display : access Gdk_Display_Record;
      Win_X   : out Gint;
      Win_Y   : out Gint;
      Win     : out Gdk_Window)
   is
      function Internal
        (Display : System.Address;
         Win_X   : access Gint;
         Win_Y   : access Gint) return Gdk_Window;
      pragma Import (C, Internal, "gdk_display_get_window_at_pointer");
      X, Y : aliased Gint;
   begin
      Win   := Internal (Get_Object (Display), X'Access, Y'Access);
      Win_X := X;
      Win_Y := Y;
   end Get_Window_At_Pointer;
         '''

    [[GdkDisplay.extra.spec]]
      text = '''

   procedure Store_Clipboard
      (Display          : not null access Gdk_Display_Record;
       Clipboard_Window : Gdk.Gdk_Window;
       Time             : Guint32;
       Targets          : Gdk.Types.Gdk_Atom_Array);
   --  Issues a request to the clipboard manager to store the clipboard data.
   --  On X11, this is a special program that works according to the
   --  freedesktop clipboard specification, available at <ulink
   --  url="http://www.freedesktop.org/Standards/clipboard-manager-spec">
   --  http://www.freedesktop.org/Standards/clipboard-manager-spec</ulink>>.
   --  Since: gtk+ 2.6
   --  "clipboard_window": a Gdk.Gdk_Window belonging to the clipboard owner
   --  "time_": a timestamp
   --  "targets": an array of targets that should be saved, or null if all
   --  available targets should be saved.
   --  "n_targets": length of the Targets array

   procedure Get_Window_At_Pointer
     (Display : access Gdk_Display_Record;
      Win_X   : out Glib.Gint;
      Win_Y   : out Glib.Gint;
      Win     : out Gdk.Gdk_Window);
   --  Obtains the window underneath the mouse pointer, returning the location
   --  of that window in Win_X, Win_Y. Returns nullif the window
   --  under the mouse pointer is not known to GDK (for example, belongs to
   --  another application).
   --  (Win_X, Win_Y) are relative to the origin of the window under the
   --  pointer.
   --
   --  Obsolescent: use Gdk.Device.Get_Window_At_Position instead.
         '''