# ============================================================
#   GtkMenu
# ============================================================

[[parameter]]
name = "self"
ada = "Menu"

[[callback]]
id = "Gtk_Menu_Position_Func"

[[callback.parameter]]
name = "x"
direction = "out"

[[callback.parameter]]
name = "y"
direction = "out"

[[method]]
id = "gtk_menu_get_active"
return = "GtkMenuItem"

[[method]]
id = "gtk_menu_popup"

[[method.parameter]]
name = "parent_menu_shell"
ctype = "GtkMenuShell"
default = "null"

[[method.parameter]]
name = "parent_menu_item"
ctype = "GtkMenuItem"
default = "null"

[[method.parameter]]
name = "func"
default = "null"

[[method.parameter]]
name = "button"
default = "1"

[[method.parameter]]
name = "activate_time"
default = "0"

[[method]]
id = "gtk_menu_get_for_attach_widget"
return = "WidgetList*"