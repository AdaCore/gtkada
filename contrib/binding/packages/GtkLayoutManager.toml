[doc]
group = "Layout containers"

[[parameter]]
name = "self"
ada = "Manager"

# Several of these methods take or return a Gtk.Widget. Binding them with
# their natural Gtk.Widget type would make this spec `with Gtk.Widget`, but
# Gtk.Widget already `with`s Gtk.Layout_Manager (for Get_Layout_Manager /
# Set_Layout_Manager). That circular dependency cannot be expressed without
# `limited with`, which the generator does not support. To break the cycle the
# widget-typed parameters are exposed as Glib.Object.GObject (already `with`ed
# by this package), and the caller converts them to/from the concrete widget
# type. The layout child returned by get_layout_child is exposed as the
# in-package Gtk_Layout_Child type (declared here via GtkLayoutChild.toml's
# `into = "GtkLayoutManager"`), so it likewise introduces no new `with`.

[[method]]
id = "gtk_layout_manager_allocate"
[[method.parameter]]
name = "widget"
type = "Glib.Object.GObject"

[[method]]
id = "gtk_layout_manager_get_layout_child"
[[method.parameter]]
name = "child"
type = "Glib.Object.GObject"

[[method]]
id = "gtk_layout_manager_get_widget"
return = "GObject*"

[[method]]
id = "gtk_layout_manager_measure"
[[method.parameter]]
name = "widget"
type = "Glib.Object.GObject"
