[GtkGesture]

  [[GtkGesture.list]]
    ada = "Gesture_List"
    ctype = "GtkGesture"

  [[GtkGesture.list]]
    ada = "Gdk_Event_Sequence_List"
    ctype = "GdkEventSequence"

  [[GtkGesture.method]]
    id = "gtk_gesture_get_group"
    return = "GestureList"

