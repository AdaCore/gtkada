   function Get_Active_Text
     (Combo_Box : not null access Gtk_Combo_Box_Record)
      return UTF8_String is
   begin
      if not Combo_Box.Get_Has_Entry then
         return "";
      end if;

      return Gtk_Entry (Combo_Box.Get_Child).Get_Text;
   end Get_Active_Text;

        '''

